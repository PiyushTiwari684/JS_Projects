<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="container">

        <div class="header">
            <h2>Expense Tracker</h2>
            <div>
                <p>Your Balance <span id="text-balance">X-amount</span></p>
                <h3 id="balance">X-amount</h3>
            </div>

            <div class="income-expense-container">
                <div>
                    <h2>INCOME</h2>
                    <p id="inc-amt">X-amount</p>
                </div>

                <div>
                    <h2>EXPENSE</h2>
                    <p id="exp-amt">X-amount</p>
                </div>
            </div>
             

        </div>

        <div class="history-section">
            <h2>History</h2>
            <ul id="list" class="list">
                <li class="plus">
                    Salary <span>+$5000</span><button class="delete-btn">x</button>
                </li>
                <li class="minus">
                    Rent <span>-$400</span><button class="delete-btn">x</button>
                </li>
            </ul>
        </div>


        <div class="form-section">
            <h2>Add new transaction</h2>
            <form id="form">
                <div>
                    <label for="text">Text</label>
                    <input type="text" id="text" placeholder="Enter description">
                </div>
                <div>
                    <label for="amount">Amount</label>
                    <input type="number" id="amount" placeholder="Enter amount">
                </div>
                <button type="submit">Add Transaction</button>
            </form>
        </div>
    </div>
    <script src="index.js"></script>

</body>
</html>
